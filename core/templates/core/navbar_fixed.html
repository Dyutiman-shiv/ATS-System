<!-- Navbar (Solid background)-->
<!-- Remove "navbar-sticky" class to make navigation bar scrollable with the page.-->
<header class="cs-header navbar navbar-expand-lg navbar-light bg-light navbar-sticky navbar-box-shadow" data-scroll-header>
  <div class="container px-0 px-xl-3">
      <button class="navbar-toggler ml-n2 mr-2" type="button" data-toggle="offcanvas" data-offcanvas-id="primaryMenu">
          <span class="navbar-toggler-icon"></span>
      </button>
      <a class="navbar-brand order-lg-1 mx-auto ml-lg-0 pr-lg-2 mr-lg-4" href="/">
          <img class="d-none d-lg-block" width="120" src="https://launchxlabs.ai/static/img/logo/launchx1.svg" alt="Around"/>
          <img class="d-lg-none" width="58" src="https://launchxlabs.ai/static/img/logo/launchx1.svg" alt="Around"/>
      </a>
      {% comment %} 
      <div class="d-flex align-items-center order-lg-3 ml-lg-auto">
          {% if not user.is_authenticated %}
          <a class="nav-link-style font-size-sm text-nowrap" href="#modal-signin" data-toggle="modal" data-view="#modal-signin-view">
              <i class="fe-user font-size-xl mr-2"></i>Sign in
          </a>
          {% else %}
          {% endcomment %}
          {% comment %}
          <a class="nav-link-style font-size-sm text-nowrap" href="/candidate/dashboard">
              <i class="fe-pie-chart font-size-xl mr-2"></i>Dashboard
          </a>
          {% endif %}
          {% endcomment %}
      </div>
  </div>
</header>

<style>
  /* Custom CSS to move the "Jobs" button downwards */
  .main-menu a[href="http://127.0.0.1:8080/about/careers"] {
      margin-top: 10px; /* Adjust this value as needed */
  }
</style>
