# the upstream component nginx needs to connect to
upstream hq {
    server unix://var/www/www.hireq.ai/hq.sock; # for a file socket
}

# Redirect http to https
server {
    listen          80;
    server_name     hireq.ai www.hireq.ai;
    rewrite ^/(.*)  https://www.hireq.ai/$1 permanent;
}

